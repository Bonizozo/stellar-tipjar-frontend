<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stellar TipJar</title>
  <style>
    :root {
      --bg: #0b0b14;
      --card-bg: rgba(255, 255, 255, 0.05);
      --accent: #7c3aed;
      --accent-gradient: linear-gradient(135deg, #7c3aed, #2563eb);
      --text: #e8e8f0;
      --text-muted: rgba(232, 232, 240, 0.5);
      --border: rgba(255, 255, 255, 0.1);
      --glass: rgba(255, 255, 255, 0.03);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 350px;
      min-height: 480px;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .header {
      padding: 20px 16px 12px;
      background: linear-gradient(180deg, rgba(124, 58, 237, 0.1) 0%, transparent 100%);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 32px;
      height: 32px;
      background: var(--accent-gradient);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }

    .brand h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
    .subtitle { font-size: 11px; color: var(--text-muted); }

    .nav-tabs {
      display: flex;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      gap: 20px;
    }

    .tab {
      padding: 10px 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }

    .tab.active { color: var(--text); }
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }

    .content { padding: 16px; min-height: 300px; }

    /* Glass Card */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(10px);
      margin-bottom: 16px;
    }

    /* Wallet info */
    .wallet-connected {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .wallet-balance { font-size: 18px; font-weight: 700; color: #fff; }
    .wallet-address { font-family: monospace; font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* Button styles */
    .btn {
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent-gradient);
      color: #fff;
      padding: 12px;
      width: 100%;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.2);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124, 58, 237, 0.3); }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: #fff;
      padding: 8px 12px;
      font-size: 12px;
    }

    /* Tip Section */
    .creator-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .creator-avatar { width: 44px; height: 44px; border-radius: 12px; background: #2a2a3e; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .creator-info h2 { font-size: 15px; font-weight: 600; }
    .creator-info p { font-size: 12px; color: var(--text-muted); }

    .quick-amounts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
    .quick-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 4px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .quick-btn.active { background: rgba(124, 58, 237, 0.2); border-color: var(--accent); color: #fff; }

    input, select {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: #fff;
      padding: 12px;
      font-size: 14px;
      width: 100%;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus { border-color: var(--accent); }

    /* Discover Section */
    .search-box { position: relative; margin-bottom: 16px; }
    .search-box input { padding-left: 36px; margin-bottom: 0; }
    .search-icon { position: absolute; left: 12px; top: 12px; color: var(--text-muted); }

    .creator-list { display: flex; flex-direction: column; gap: 10px; }
    .creator-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .creator-item:hover { background: rgba(255, 255, 255, 0.08); }
    .creator-item-avatar { width: 36px; height: 36px; border-radius: 8px; background: #2a2a3e; display: flex; align-items: center; justify-content: center; }
    .creator-item-info h3 { font-size: 13px; font-weight: 600; }
    .creator-item-info p { font-size: 11px; color: var(--text-muted); }

    /* Utils */
    .hidden { display: none !important; }
    .status { padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 10px; text-align: center; }
    .status-success { background: rgba(34, 197, 94, 0.1); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.2); }
    .status-error { background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.2); }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }

    footer {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--text-muted);
    }
    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <div class="logo">⭐</div>
      <div>
        <h1>Stellar TipJar</h1>
        <div class="subtitle">Quick Tips for Creators</div>
      </div>
    </div>
    <button class="btn-secondary" id="options-btn">⚙️</button>
  </div>

  <div class="nav-tabs">
    <div class="tab active" id="tab-tip">Tip</div>
    <div class="tab" id="tab-discover">Discover</div>
  </div>

  <div class="content">
    <!-- Wallet Card -->
    <div class="card" id="wallet-card">
      <div id="wallet-disconnected">
        <button class="btn btn-primary" id="connect-btn">Connect Freighter</button>
      </div>
      <div id="wallet-connected" class="wallet-connected hidden">
        <div>
          <div class="wallet-balance" id="wallet-balance">0.00 XLM</div>
          <div class="wallet-address" id="wallet-address">G...XXXX</div>
        </div>
        <button class="btn-secondary" id="disconnect-btn">Disconnect</button>
      </div>
      <div id="wallet-error" class="status status-error hidden"></div>
    </div>

    <!-- Tip Section -->
    <div id="section-tip">
      <div id="creator-detected" class="hidden">
        <div class="creator-header">
          <div class="creator-avatar" id="creator-avatar">👤</div>
          <div class="creator-info">
            <h2 id="creator-name">@username</h2>
            <p id="creator-meta">Detected on this page</p>
          </div>
        </div>

        <div class="quick-amounts">
          <button class="quick-btn" data-amount="1">1 XLM</button>
          <button class="quick-btn" data-amount="5">5 XLM</button>
          <button class="quick-btn" data-amount="10">10 XLM</button>
          <button class="quick-btn" data-amount="25">25 XLM</button>
        </div>

        <input type="number" id="amount-input" step="0.01" value="5" placeholder="Amount (XLM)">
        <input type="text" id="message-input" placeholder="Message (optional)">

        <button class="btn btn-primary" id="send-btn">Send Tip</button>
        <div id="tip-status" class="status hidden"></div>
      </div>

      <div id="no-creator" class="empty-state">
        <div class="icon">🔍</div>
        <p>No creator detected on this page.</p>
        <p style="font-size: 11px; margin-top: 8px;">Switch to the <b>Discover</b> tab to find creators.</p>
      </div>

      <div id="connect-prompt" class="empty-state hidden">
        <div class="icon">🔗</div>
        <p>Connect your wallet to start tipping.</p>
      </div>
    </div>

    <!-- Discover Section -->
    <div id="section-discover" class="hidden">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search creators by name or tag...">
      </div>

      <div id="discovery-loading" class="empty-state hidden">
        <div class="spinner" style="margin: 0 auto 12px;"></div>
        <p>Finding creators...</p>
      </div>

      <div id="creator-list" class="creator-list">
        <!-- Creators will be injected here -->
      </div>

      <div id="discovery-empty" class="empty-state hidden">
        <p>No creators found.</p>
      </div>
    </div>
  </div>

  <footer>
    <a href="https://stellar-tipjar.app" target="_blank">stellar-tipjar.app</a>
    <span id="detected-count"></span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
